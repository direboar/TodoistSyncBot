name: Sync Discord Schedule to Todoist

on:
  schedule:
    # 毎日 0, 1, ..., 23時の毎時00分に実行 (UTC) => JST: 毎時00分
    - cron: '0 * * * *'
  # 手動実行用トリガー
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    
    # リポジトリへの書き込み（コミット）権限を付与
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sync script
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          TARGET_CATEGORY_PREFIX: ${{ vars.TARGET_CATEGORY_PREFIX || '公民館予約' }}
          TODOIST_PROJECT_ID: ${{ vars.TODOIST_PROJECT_ID || '' }}
          EVENT_TITLE_PREFIX: ${{ vars.EVENT_TITLE_PREFIX || 'FN8' }}
        run: python main.py

      - name: Commit state.json
        run: |
          # 差分があるか確認
          if [[ -n $(git status -s state.json) ]]; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git add state.json
            git commit -m "Update state.json from GitHub Actions"
            git push
          else
            echo "No changes to state.json"
          fi
